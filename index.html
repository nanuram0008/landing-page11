<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator Signal Pro</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(180deg, #0b2a35, #071c24);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
    max-width: 420px;
    margin: auto;
}

/* LOGO */
.logo {
    width: 140px;
    height: 140px;
    margin: 20px auto;
    border-radius: 50%;
    overflow: hidden;
    background: black;
    box-shadow: 0 0 20px rgba(255,0,0,0.6);
}

.logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

h1 {
    font-size: 24px;
    margin-bottom: 10px;
}

.subtext {
    color: #bbb;
    margin-bottom: 20px;
}

.users {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 14px;
}

.timer {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
}

.time-box {
    background: linear-gradient(180deg, #ffd700, #ffb800);
    color: black;
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: bold;
}

.btn {
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    padding: 14px;
    border-radius: 30px;
    color: white;
    text-decoration: none;
    font-size: 18px;
    display: block;
    margin: 20px 0;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(0,150,255,0.5);
}

.btn:hover {
    transform: scale(1.05);
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #aaa;
    line-height: 1.5;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGO (BASE64 IMAGE) -->
    <div class="logo">
        <img src="WhatsApp Image 2026-04-14 at 4.06.13 PM.jpeg
" alt="logo">
    </div>

    <h1>AVIATOR SIGNAL FREE</h1>

    <p class="subtext">Live insights • Community discussion • Entertainment</p>

    <div class="users">
        🔥 <span id="users">1243</span> people are using this now
    </div>

    <div class="timer">
        <div class="time-box">
            <div id="minutes">00</div>
            <small>Min</small>
        </div>
        <div class="time-box">
            <div id="seconds">60</div>
            <small>Sec</small>
        </div>
    </div>

    <a href="https://t.me/+1P8a3sPM3JlmNDU1" class="btn">
        🚀 Join Telegram Channel
    </a>

    <div>⭐⭐⭐⭐⭐ 4.9 Rating</div>

    <div class="footer">
        18+ Only • Entertainment purpose only <br>
        No guarantees • Participate responsibly <br><br>
        © 2026 Aviator
    </div>

</div>

<script>
let time = 60;

setInterval(() => {
    let m = Math.floor(time / 60);
    let s = time % 60;

    document.getElementById("minutes").innerText = String(m).padStart(2,'0');
    document.getElementById("seconds").innerText = String(s).padStart(2,'0');

    time--;

    if(time < 0){
        window.location.href = "https://t.me/+1P8a3sPM3JlmNDU1";
    }
}, 1000);

let users = 1243;

setInterval(() => {
    let change = Math.floor(Math.random() * 5);
    users += Math.random() > 0.5 ? change : -change;
    document.getElementById("users").innerText = users;
}, 3000);
</script>

</body>
</html>
