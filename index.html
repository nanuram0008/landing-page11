<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator Signal</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(180deg, #0b2a35, #071c24);
    color: white;
    text-align: center;
}

/* Container */
.container {
    padding: 25px;
    max-width: 400px;
    margin: auto;
}

/* Logo */
.logo {
    width: 130px;
    height: 130px;
    background: black;
    border-radius: 50%;
    margin: 20px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ff2d2d;
    font-size: 26px;
    font-weight: bold;
    box-shadow: 0 0 20px rgba(255,0,0,0.5);
}

/* Heading */
h1 {
    font-size: 26px;
    margin-bottom: 10px;
}

.subtext {
    color: #bbb;
    margin-bottom: 25px;
}

/* Timer */
.timer {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 25px;
}

.time-box {
    background: linear-gradient(180deg, #ffd700, #ffb800);
    color: black;
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: bold;
    font-size: 18px;
    min-width: 80px;
}

/* Button */
.btn {
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    padding: 14px;
    border-radius: 30px;
    color: white;
    text-decoration: none;
    font-size: 18px;
    display: block;
    margin: 20px 0;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(0,150,255,0.5);
}

.btn:hover {
    transform: scale(1.05);
}

/* Rating */
.rating {
    font-size: 16px;
    margin-top: 10px;
}

/* Footer */
.footer {
    margin-top: 25px;
    font-size: 12px;
    color: #aaa;
    line-height: 1.5;
}

/* Animation */
.fade-in {
    animation: fadeIn 1.2s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Mobile */
@media(max-width: 400px){
    h1 { font-size: 22px; }
}
</style>
</head>

<body>

<div class="container fade-in">

    <div class="logo">✈️ Aviator</div>

    <h1>AVIATOR HACK SIGNAL FREE</h1>

    <p class="subtext">
        Live insights • Community discussion • Entertainment
    </p>

    <div class="timer">
        <div class="time-box">
            <div id="minutes">00</div>
            <small>Min</small>
        </div>
        <div class="time-box">
            <div id="seconds">60</div>
            <small>Sec</small>
        </div>
    </div>

    <!-- Telegram Button -->
    <a href="https://t.me/YOUR_CHANNEL" class="btn">
        🚀 Join Telegram Channel
    </a>

    <div class="rating">⭐⭐⭐⭐⭐ 4.9 Community Rating</div>

    <div class="footer">
        18+ Only • Entertainment purpose only <br>
        No guarantees • Participate responsibly <br><br>
        © 2026 Aviator
    </div>

</div>

<script>
// Countdown Timer Loop
let time = 60;

setInterval(() => {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
    document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');

    time--;
    if (time < 0) time = 60;
}, 1000);

// Redirect after click delay
document.querySelector(".btn").addEventListener("click", function(){
    alert("Redirecting to Telegram...");
});
</script>

</body>
</html>
